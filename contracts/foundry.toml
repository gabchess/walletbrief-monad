[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
# Required for vm.signDelegation/vm.attachDelegation (EIP-7702 test cheatcodes) --
# Monad mainnet supports EIP-7702 natively (docs.monad.xyz/developer-essentials/eip-7702).
evm_version = "prague"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
monad_mainnet = "${MONAD_RPC_URL}"

[fmt]
line_length = 100
